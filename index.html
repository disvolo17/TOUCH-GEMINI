<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Tracking Pro</title>
    <style>
        body {
            margin: 0;
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }
        .container {
            position: relative;
            width: 800px;
            height: 600px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            transform: scaleX(-1); /* Зеркальное отображение */
        }
        video {
            display: none;
        }
        .status {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.8);
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 16px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            font-size: 14px;
            letter-spacing: 0.5px;
            z-index: 10;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="status" id="status">Инициализация AI...</div>
    <video id="video" playsinline></video>
    <canvas id="canvas"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<script>
    const videoElement = document.getElementById('video');
    const canvasElement = document.getElementById('canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const statusDiv = document.getElementById('status');

    function onResults(results) {
        // Устанавливаем размер канваса под размер контейнера
        canvasElement.width = canvasElement.clientWidth;
        canvasElement.height = canvasElement.clientHeight;

        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        
        // Отрисовка видео-фида (опционально можно сделать прозрачным)
        canvasCtx.globalAlpha = 0.3;
        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
        canvasCtx.globalAlpha = 1.0;

        if (results.multiHandLandmarks) {
            statusDiv.innerText = `Рук в кадре: ${results.multiHandLandmarks.length}`;
            for (const landmarks of results.multiHandLandmarks) {
                // Премиальный стиль: неоновые линии
                drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS,
                    {color: '#00FFC2', lineWidth: 4});
                drawLandmarks(canvasCtx, landmarks, {
                    color: '#FFFFFF', 
                    lineWidth: 1, 
                    radius: 4
                });
            }
        } else {
            statusDiv.innerText = "Покажите руки в камеру";
        }
        canvasCtx.restore();
    }

    const hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
        maxNumHands: 2,
        modelComplexity: 1,
        minDetectionConfidence: 0.7,
        minTrackingConfidence: 0.7
    });

    hands.onResults(onResults);

    const camera = new Camera(videoElement, {
        onFrame: async () => {
            await hands.send({image: videoElement});
        },
        width: 1280,
        height: 720
    });

    camera.start().then(() => {
        statusDiv.innerText = "Камера активна. Готов к работе.";
    });
</script>

</body>
</html>
