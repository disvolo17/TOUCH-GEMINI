<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Finger GPT - Motion Control</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <style>
    body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; overflow: hidden; }
    #container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
    canvas { position: absolute; transform: scaleX(-1); border-radius: 20px; box-shadow: 0 0 30px rgba(0,255,194,0.2); }
    video { display: none; }
    #info { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.5); padding: 15px; border-radius: 10px; backdrop-filter: blur(5px); }
  </style>
</head>
<body>
  <div id="container">
    <div id="info">Статус: <span id="status">Загрузка нейросети...</span></div>
    <video id="input_video"></video>
    <canvas id="output_canvas"></canvas>
  </div>

<script>
const videoElement = document.getElementById('input_video');
const canvasElement = document.getElementById('output_canvas');
const canvasCtx = canvasElement.getContext('2d');
const statusText = document.getElementById('status');

function onResults(results) {
  statusText.innerText = results.multiHandLandmarks.length > 0 ? "Рука обнаружена" : "Покажите руку";
  
  canvasElement.width = window.innerWidth * 0.8;
  canvasElement.height = window.innerHeight * 0.8;
  
  canvasCtx.save();
  canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
  canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
  
  if (results.multiHandLandmarks) {
    for (const landmarks of results.multiHandLandmarks) {
      drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#00FFC2', lineWidth: 5});
      drawLandmarks(canvasCtx, landmarks, {color: '#FF007A', lineWidth: 2, radius: 3});
    }
  }
  canvasCtx.restore();
}

const hands = new Hands({
  locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
  maxNumHands: 1,
  modelComplexity: 1,
  minDetectionConfidence: 0.5,
  minTrackingConfidence: 0.5
});

hands.onResults(onResults);

const camera = new Camera(videoElement, {
  onFrame: async () => {
    await hands.send({image: videoElement});
  },
  width: 1280,
  height: 720
});

camera.start()
  .then(() => statusText.innerText = "Камера готова")
  .catch(err => statusText.innerText = "Ошибка камеры: " + err);
</script>
</body>
</html>
