<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Finger GPT | Hand Tracking</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

  <style>
    body { margin: 0; background: #000; color: #00ffc2; font-family: 'Courier New', monospace; overflow: hidden; }
    #container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    canvas { transform: scaleX(-1); width: 90%; max-width: 800px; border: 2px solid #00ffc2; border-radius: 15px; box-shadow: 0 0 20px #00ffc2; }
    video { display: none; }
    #overlay { position: absolute; top: 20px; background: rgba(0,0,0,0.8); padding: 10px 20px; border-radius: 5px; border: 1px solid #00ffc2; }
  </style>
</head>
<body>

<div id="container">
    <div id="overlay">STATUS: <span id="status">INIT...</span></div>
    <video id="input_video"></video>
    <canvas id="output_canvas"></canvas>
</div>

<script type="module">
  const videoElement = document.getElementById('input_video');
  const canvasElement = document.getElementById('output_canvas');
  const canvasCtx = canvasElement.getContext('2d');
  const statusLabel = document.getElementById('status');

  function onResults(results) {
    // Авто-подстройка размера под экран
    canvasElement.width = videoElement.videoWidth || 800;
    canvasElement.height = videoElement.videoHeight || 600;

    canvasCtx.save();
    canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
    
    // Рисуем видео-подложку
    canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
      statusLabel.innerText = "TRACKING ACTIVE";
      for (const landmarks of results.multiHandLandmarks) {
        drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#00FFC2', lineWidth: 4});
        drawLandmarks(canvasCtx, landmarks, {color: '#FFFFFF', lineWidth: 1, radius: 3});
      }
    } else {
      statusLabel.innerText = "SEARCHING FOR HANDS...";
    }
    canvasCtx.restore();
  }

  const hands = new Hands({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
  });

  hands.setOptions({
    maxNumHands: 2,
    modelComplexity: 1,
    minDetectionConfidence: 0.5,
    minTrackingConfidence: 0.5
  });

  hands.onResults(onResults);

  const camera = new Camera(videoElement, {
    onFrame: async () => {
      await hands.send({image: videoElement});
    },
    width: 1280,
    height: 720
  });

  // Запуск с обработкой ошибок
  camera.start()
    .then(() => statusLabel.innerText = "CAMERA ON")
    .catch(err => {
        statusLabel.innerText = "ERROR: " + err;
        console.error(err);
    });
</script>

</body>
</html>
